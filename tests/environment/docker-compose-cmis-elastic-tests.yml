version: "2"

services:
  alfresco:
    image: ${CMIS_ALFRESCO_IMAGE}
    mem_limit: 3400m
    environment:
      CATALINA_OPTS: "-agentlib:jdwp=transport=dt_socket,address=*:8000,server=y,suspend=n"
      JAVA_TOOL_OPTIONS: >- #pragma: allowlist secret
        -Dencryption.keystore.type=JCEKS
        -Dencryption.cipherAlgorithm=DESede/CBC/PKCS5Padding
        -Dencryption.keyAlgorithm=DESede
        -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
        -Dmetadata-keystore.password=mp6yc0UD9e
        -Dmetadata-keystore.aliases=metadata
        -Dmetadata-keystore.metadata.password=oKIWzVdEdA
        -Dmetadata-keystore.metadata.algorithm=DESede
      JAVA_OPTS: >- #pragma: allowlist secret
        -Delasticsearch.createIndexIfNotExists=true
        ${DATABASE_ENV_PROPERTIES}
        -Dindex.subsystem.name=elasticsearch
        -Delasticsearch.host=elasticsearch
        -Delasticsearch.indexName=${ELASTICSEARCH_INDEX_NAME}
        -Dshare.host=127.0.0.1
        -Dshare.port=8082
        -Dalfresco.host=localhost
        -Dalfresco.port=8082
        -Dsolr.secureComms=secret
        -Dsolr.sharedSecret=i7wdvtrsfts
        -Daos.baseUrlOverwrite=http://localhost:8080/alfresco/aos
        -Dmessaging.broker.url="failover:(nio://activemq:61616)?timeout=3000&jms.useCompression=true"
        -Dmessaging.broker.username=admin
        -Dmessaging.broker.password=admin
        -Ddeployment.method=DOCKER_COMPOSE
        -Dtransform.service.enabled=true
        -Dtransform.service.url=http://transform-router:8095
        -Dsfs.url=http://shared-file-store:8099/
        -DlocalTransform.core-aio.url=http://transform-core-aio:8090/
        -Dalfresco-pdf-renderer.url=http://transform-core-aio:8090/
        -Djodconverter.url=http://transform-core-aio:8090/
        -Dimg.url=http://transform-core-aio:8090/
        -Dtika.url=http://transform-core-aio:8090/
        -Dtransform.misc.url=http://transform-core-aio:8090/
        -Dcsrf.filter.enabled=false
        -Dalfresco.restApi.basicAuthScheme=true
        -Xms1500m -Xmx1500m
    ports:
      - 8082:8080
      - 8000:8000

  database:
    image: postgres:${POSTGRES_TAG}
    mem_limit: 512m
    environment:
      - POSTGRES_PASSWORD=alfresco
      - POSTGRES_USER=alfresco
      - POSTGRES_DB=alfresco
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    ports:
      - 5432:5432

  transform-router:
    mem_limit: 512m
    image: quay.io/alfresco/alfresco-transform-router:${TRANSFORM_ROUTER_TAG}
    environment:
      JAVA_OPTS: " -Xms256m -Xmx512m"
      ACTIVEMQ_URL: "nio://activemq:61616"
      ACTIVEMQ_USER: admin
      ACTIVEMQ_PASSWORD: admin #pragma: allowlist secret
      CORE_AIO_URL: "http://transform-core-aio:8090"
      FILE_STORE_URL: "http://shared-file-store:8099/alfresco/api/-default-/private/sfs/versions/1/file"
    ports:
      - 8095:8095
    links:
      - activemq

  transform-core-aio:
    image: quay.io/alfresco/alfresco-transform-core-aio:${TRANSFORM_CORE_AIO_TAG}
    mem_limit: 1536m
    environment:
      JAVA_OPTS: " -Xms256m -Xmx1536m"
      ACTIVEMQ_URL: "nio://activemq:61616"
      ACTIVEMQ_USER: admin
      ACTIVEMQ_PASSWORD: admin #pragma: allowlist secret
      FILE_STORE_URL: "http://shared-file-store:8099/alfresco/api/-default-/private/sfs/versions/1/file"
    ports:
      - 8090:8090
    links:
      - activemq

  shared-file-store:
    image: quay.io/alfresco/alfresco-shared-file-store:${SHARED_FILE_STORE_TAG}
    mem_limit: 512m
    environment:
      JAVA_OPTS: " -Xms256m -Xmx512m"
      scheduler.content.age.millis: 86400000
      scheduler.cleanup.interval: 86400000
    ports:
      - 8099:8099
    volumes:
      - shared-file-store-volume:/tmp/Alfresco/sfs

  share:
    image: quay.io/alfresco/alfresco-share:${SHARE_TAG}
    mem_limit: 512m
    environment:
      REPO_HOST: "alfresco"
      REPO_PORT: "8082"
      JAVA_OPTS: "
        -Xms500m
        -Xmx500m
        -Dalfresco.host=localhost
        -Dalfresco.port=8082
        -Dalfresco.context=alfresco
        -Dalfresco.protocol=http
        "

  activemq:
    image: quay.io/alfresco/alfresco-activemq:${ACTIVEMQ_TAG}
    mem_limit: 1g
    ports:
      - 8161:8161 # Web Console
      - 5672:5672 # AMQP
      - 61616:61616 # OpenWire
      - 61613:61613 # STOMP

  digital-workspace:
    image: quay.io/alfresco/alfresco-digital-workspace:${DIGITAL_WORKSPACE_TAG}
    mem_limit: 128m
    environment:
      BASEPATH: ./

  # HTTP proxy to provide HTTP Default port access to services
  proxy:
    image: alfresco/alfresco-acs-nginx:${ACS_NGINX_TAG}
    environment:
      DISABLE_CONTROL_CENTER: "true"
      DISABLE_SYNCSERVICE: "true"
      DISABLE_PROMETHEUS: "true"
    mem_limit: 128m
    depends_on:
      - alfresco
    ports:
      - 8080:8082
    links:
      - digital-workspace
      - alfresco
      - share

  elasticsearch:
    image: elasticsearch:${ELASTICSEARCH_TAG}
    mem_limit: 1700m
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    cap_add:
      - IPC_LOCK
    #    volumes:
    #      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
      - 9300:9300

  kibana:
    image: kibana:${KIBANA_TAG}
    mem_limit: 1024m
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - 5601:5601
    depends_on:
      - elasticsearch

  live-indexing:
    image: alfresco-es-indexing-jdbc:latest
    mem_limit: 512m
    depends_on:
      - elasticsearch
      - alfresco
    environment:
      ELASTICSEARCH_INDEXNAME: alfresco
      ALFRESCO_ACCEPTED_CONTENT_MEDIA_TYPES_CACHE_BASE_URL: >-
              http://transform-core-aio:8090/transform/config
      SPRING_ELASTICSEARCH_REST_URIS: http://elasticsearch:9200
      SPRING_ACTIVEMQ_BROKERURL: nio://activemq:61616
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/alfresco
      SPRING_DATASOURCE_USERNAME: alfresco
      SPRING_DATASOURCE_PASSWORD: alfresco
      SPRING_ACTIVEMQ_USER: admin
      SPRING_ACTIVEMQ_PASSWORD: admin #pragma: allowlist secret
      ALFRESCO_TRANSFORM_CORE_AIO_URL: http://transform-core-aio:8090
      ALFRESCO_TRANSFORM_CORE_AIO_ACSURL: http://alfresco:8082
      ALFRESCO_CONTENT_TRANFORM_URLPATH: /alfresco/service/api/solr/textContent
      ALFRESCO_CONTENT_TRANSFORM_SHAREDSECRET: i7wdvtrsfts
      ALFRESCO_REINDEX_POLLINGINTERVALMS: 30000
      ALFRESCO_REINDEX_MAXPOLLINGINTERVALMS: 300000
      ALFRESCO_REINDEX_OVERLAPSECONDS: 600
      ALFRESCO_REINDEX_WATERMARKINDEXNAME: alfresco-reindex-state
      ALFRESCO_REINDEX_SKIPENABLED: TRUE
      ALFRESCO_REINDEX_SKIPLIMIT: 100
      ALFRESCO_REINDEX_SUCCESSRATIO: 0.5
      ALFRESCO_REINDEX_MAXWINDOWMINUTES: 30
      ALFRESCO_REINDEX_MAXGAPAGEHOURS: 1

volumes:
  shared-file-store-volume:
    driver_opts:
      type: tmpfs
      device: tmpfs
